version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: morphos
      POSTGRES_USER: morphos
      POSTGRES_PASSWORD: morphos_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mutation-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: mutation-service
        SERVICE_PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://morphos:morphos_dev@postgres:5432/morphos
      REDIS_URL: redis://redis:6379

  agent-orchestrator:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: agent-orchestrator
        SERVICE_PORT: 3003
    ports:
      - "3003:3003"
    depends_on:
      - mutation-service
    environment:
      NODE_ENV: development
      PORT: 3003
      MUTATION_SERVICE_URL: http://mutation-service:3002

  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
    ports:
      - "3000:3000"
    depends_on:
      - mutation-service
      - agent-orchestrator
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3002

volumes:
  postgres_data:
  redis_data:
