apiVersion: apps/v1
kind: Deployment
metadata:
  name: mutation-service
  namespace: morphos
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mutation-service
  template:
    metadata:
      labels:
        app: mutation-service
    spec:
      containers:
      - name: mutation-service
        image: morphos/mutation-service:latest
        ports:
        - containerPort: 3002
        env:
        - name: PORT
          value: "3002"
        - name: NODE_ENV
          value: "production"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: mutation-service
  namespace: morphos
spec:
  selector:
    app: mutation-service
  ports:
  - protocol: TCP
    port: 3002
    targetPort: 3002
  type: ClusterIP
