apiVersion: apps/v1
kind: Deployment
metadata:
  name: morphos-web
  namespace: morphos
spec:
  replicas: 3
  selector:
    matchLabels:
      app: morphos-web
  template:
    metadata:
      labels:
        app: morphos-web
    spec:
      containers:
      - name: morphos-web
        image: morphos/web:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: NEXT_PUBLIC_API_URL
          value: "http://mutation-service:3002"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: morphos-web
  namespace: morphos
spec:
  selector:
    app: morphos-web
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer
